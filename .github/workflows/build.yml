name: Build ZMK Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [nice_nano_v2, nice_nano, bdn9]
    
    steps:
      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          path: zmk
          submodules: true
          token: ${{ secrets.GH_PAT }}
      
      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: config
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi device-tree-compiler cmake ninja-build gperf ccache dfu-util python3-pip
          pip install west
      
      - name: Build
        run: |
          cd zmk
          west init -l config
          west update
          west build -b ${{ matrix.board }} -- -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware-${{ matrix.board }}
          path: |
            build/zephyr/zmk.uf2
          retention-days: 5
